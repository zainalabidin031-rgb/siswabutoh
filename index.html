<!DOCTYPE html>
<html lang="id">
<head>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; padding: 20px; margin: 0; }
        .container { max-width: 650px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .peta-petunjuk { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        /* Pembungkus Filter */
        .filter-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select { flex: 1; min-width: 130px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; background-color: #fff; cursor: pointer; }
        input[type="text"] { flex: 2; min-width: 200px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        /* Daftar Siswa */
        .siswa-list { max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 5px; }
        .siswa-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .siswa-item:last-child { border-bottom: none; }
        .siswa-info { display: flex; flex-direction: column; }
        .siswa-nama { font-weight: 500; color: #2c3e50; }
        .siswa-kelas { font-size: 12px; color: #e67e22; font-weight: bold; margin-top: 3px; }
        .btn-isi { background: #2ecc71; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 13px; transition: background 0.2s; }
        .btn-isi:hover { background: #27ae60; }
        
        /* Pesan jika tidak ketemu */
        .no-data { text-align: center; padding: 20px; color: #95a5a6; display: none; }
    </style>
</head>
