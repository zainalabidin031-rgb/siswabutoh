<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Nomor Induk Siswa</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .peta-petunjuk { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        /* Loading Screen */
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #3498db; font-size: 16px; }
        
        /* Box Filter */
        .filter-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select { flex: 1; min-width: 130px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; background-color: #fff; cursor: pointer; }
        input[type="text"] { flex: 2; min-width: 200px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        /* Tabel Data */
        .tabel-wrapper { max-height: 550px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; display: none; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f8f9fa; padding: 12px; color: #2c3e50; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .siswa-kelas { font-size: 11px; color: #e67e22; background: #fef5ec; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        .input-nis { padding: 8px; width: 120px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .btn-kirim { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; font-size: 13px; cursor: pointer; transition: background 0.2s; }
        .btn-kirim:hover { background: #27ae60; }
        .btn-kirim:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        .no-data { text-align: center; padding: 20px; color: #95a5a6; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Input Mandiri Nomor Induk Siswa</h2>
    <p class="peta-petunjuk">Pilih kelas atau ketik nama Anda, masukkan Nomor Induk, lalu klik Simpan.</p>
    
    <div class="filter-box">
        <select id="pilihKelas" onchange="saringData()">
            <option value="">-- Semua Kelas --</option>
            <option value="Kelas I">Kelas I</option>
            <option value="Kelas II">Kelas II</option>
            <option value="Kelas III">Kelas III</option>
            <option value="Kelas IV">Kelas IV</option>
            <option value="Kelas V">Kelas V</option>
            <option value="Kelas VI">Kelas VI</option>
        </select>
        <input type="text" id="cariNama" onkeyup="saringData()" placeholder="Ketik nama siswa untuk mencari...">
    </div>

    <div id="loading">⏳ Sedang memuat data siswa dari Database di DAPODIK</div>

    <div class="tabel-wrapper" id="tabelArea">
        <table>
            <thead>
                <tr>
                    <th>Nama Siswa</th>
                    <th>Kelas</th>
                    <th>Masukkan Nomor Induk</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                </tbody>
        </table>
    </div>
    
    <div class="no-data" id="pesanKosong">Siswa tidak ditemukan.</div>
</div>

<script>
// PENTING: PASTE URL WEB APP YANG BARU ANDA SALIN DARI APPS SCRIPT DI SINI
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxN3j63mnv8ge_enDCBzighpje7Mh05tnss7c3eb8PyCQ6HZXn4RauiCZNPul58YBJw/exec";

// Fungsi untuk memuat data dari Google Sheets saat Web dibuka pertama kali
document.addEventListener("DOMContentLoaded", function() {
    fetch(URL_APPS_SCRIPT)
    .then(response => response.json())
    .then(data => {
        let badanTabel = document.getElementById("badanTabel");
        badanTabel.innerHTML = ""; // Bersihkan baris awal
        
        data.forEach(siswa => {
            if(siswa.nama === "") return; // Skip jika baris kosong
            
            let row = document.createElement("tr");
            row.className = "siswa-row";
            row.setAttribute("data-kelas", siswa.kelas);
            
            // Cek apakah No Induk sudah terisi dari Excel/Sheets sebelumnya
            let sudahAdaNis = siswa.noInduk !== "";
            let inputAtribut = sudahAdaNis ? `value="${siswa.noInduk}" disabled` : '';
            let tombolAtribut = sudahAdaNis ? `disabled style="background:#bdc3c7;"` : '';
            let tombolTeks = sudahAdaNis ? "Tersimpan ✅" : "Simpan";
            
            row.innerHTML = `
                <td class="nama-td">${siswa.nama}</td>
                <td><span class="siswa-kelas">${siswa.kelas}</span></td>
                <td><input type="text" class="input-nis" placeholder="Contoh: 1234" ${inputAtribut}></td>
                <td><button class="btn-kirim" onclick="kirimKeSheets(this, '${siswa.nama.replace(/'/g, "\\'")}', '${siswa.kelas}')" ${tombolAtribut}>${tombolTeks}</button></td>
            `;
            badanTabel.appendChild(row);
        });
        
        // Sembunyikan tulisan loading, tampilkan tabel
        document.getElementById("loading").style.display = "none";
        document.getElementById("tabelArea").style.display = "block";
    })
    .catch(error => {
        document.getElementById("loading").innerText = "❌ Gagal memuat data. Periksa kembali sambungan internet atau URL Apps Script Anda.";
        console.error("Error:", error);
    });
});

function saringData() {
    // 1. Ambil nilai dari input nama dan dropdown kelas
    let inputNama = document.getElementById('cariNama').value.toLowerCase().trim();
    let inputKelas = document.getElementById('pilihKelas').value.toLowerCase().trim();
    
    // 2. Ambil semua baris siswa di tabel
    let rows = document.getElementsByClassName('siswa-row');
    let adaData = false;
    
    for (let i = 0; i < rows.length; i++) {
        // Ambil nama siswa dari kolom pertama
        let nama = rows[i].getElementsByClassName('nama-td')[0].innerText.toLowerCase().trim();
        
        // AMANDEMEN DI SINI: Kita ambil teks kelas langsung dari tampilan kolom kedua di tabel, 
        // bukan dari atribut data-kelas agar datanya pasti akurat dengan apa yang tertulis di layar.
        let kolomKelas = rows[i].getElementsByTagName('td')[1];
        let kelas = kolomKelas ? kolomKelas.innerText.toLowerCase().trim() : "";
        
        // 3. Logika Pencocokan
        let namaCocok = nama.indexOf(inputNama) > -1;
        
        // Jika dropdown bernilai kosong (pilih "-- Semua Kelas --"), dianggap cocok.
        // Jika dropdown dipilih, pastikan teks kelas di tabel mengandung kata yang dipilih (misal: "kelas i").
        let kelasCocok = (inputKelas === "") || (kelas.indexOf(inputKelas) > -1);
        
        // 4. Tampilkan atau sembunyikan baris
        if (namaCocok && kelasCocok) {
            rows[i].style.display = "";
            adaData = true;
        } else {
            rows[i].style.display = "none";
        }
    }
    
    // 5. Tampilkan pesan jika setelah difilter hasilnya kosong
    document.getElementById('pesanKosong').style.display = adaData ? "none" : "block";
}
    
    // Menampilkan pesan jika siswa sama sekali tidak ditemukan setelah difilter
    document.getElementById('pesanKosong').style.display = adaData ? "none" : "block";
}

function kirimKeSheets(button, nama, kelas) {
    let row = button.parentElement.parentElement;
    let inputNis = row.querySelector('.input-nis').value.trim();
    
    if (inputNis === "") {
        alert("Nomor Induk tidak boleh kosong!");
        return;
    }
    
    button.disabled = true;
    button.innerText = "Mengirim...";
    
    let urlKirim = URL_APPS_SCRIPT + "?nama=" + encodeURIComponent(nama) + "&kelas=" + encodeURIComponent(kelas) + "&noInduk=" + encodeURIComponent(inputNis);
    
    fetch(urlKirim, { method: "POST" })
    .then(response => response.json())
    .then(res => {
        alert("Berhasil tersimpan"); 
        button.innerText = "Tersimpan ✅";
        row.querySelector('.input-nis').disabled = true;
    })
    .catch(error => {
        alert("Gagal mengirim data. Coba lagi!");
        button.disabled = false;
        button.innerText = "Simpan";
        console.error(error);
    });
}
</script>
</body>
</html>
